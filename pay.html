<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SPAROO UPI Payment</title>
  <style>
    :root {
      --bg: #000000;
      --accent: #39D353;
      --text: #EAEAEA;
      --muted: rgba(234, 234, 234, 0.7);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: min(520px, 100%);
      border: 1px solid rgba(57, 211, 83, 0.25);
      border-radius: 18px;
      background: radial-gradient(circle at 30% 10%, rgba(57, 211, 83, 0.08), transparent 45%),
                  rgba(20, 20, 20, 0.7);
      padding: 22px 18px;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: rgba(57, 211, 83, 0.12);
      border: 1px solid rgba(57, 211, 83, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.8px;
      color: var(--accent);
    }

    .merchant {
      margin-top: 6px;
      font-size: 15px;
      color: var(--muted);
    }

    .merchant strong {
      color: var(--text);
      font-weight: 700;
    }

    .amount {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
    }

    .status {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(57, 211, 83, 0.25);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(234, 234, 234, 0.55);
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="brand">
        <div class="logo">S</div>
        <div class="title">SPAROO</div>
      </div>

      <div class="merchant">
        Merchant: <strong id="merchantName">-</strong>
      </div>
      <div class="amount">
        <span id="amountText">₹0.00</span>
      </div>

      <div class="status" id="statusRow">
        <div class="spinner" aria-hidden="true"></div>
        <div id="statusText">Opening payment app...</div>
      </div>

      <div class="hint">
        If your UPI app does not open automatically, try again. Some Android devices may ask for confirmation.
      </div>
    </div>
  </div>

  <noscript>
    <div style="padding: 16px; color: #fff;">JavaScript is required to start the payment.</div>
  </noscript>

  <script>
    function getParam(key) {
      const params = new URLSearchParams(window.location.search);
      return params.get(key) || "";
    }

    function formatAmountForUi(rawAmount) {
      const v = Number(String(rawAmount).trim());
      if (!isFinite(v)) return "₹0.00";
      return "₹" + v.toFixed(2);
    }

    const pa = getParam("pa");
    const pn = getParam("pn");
    const am = getParam("am");

    document.getElementById("merchantName").textContent = pn || "-";
    document.getElementById("amountText").textContent = formatAmountForUi(am);

    function buildUpiUrl() {
      const timestamp = Date.now();
      const safePa = encodeURIComponent(pa);
      const safePn = encodeURIComponent(pn);
      const safeAm = encodeURIComponent(String(am).trim());

      // Required format:
      // upi://pay?pa=&pn=&mc=0000&tr=SPAROO_{timestamp}&tn=SPAROO+Payment&am=&cu=INR
      return "upi://pay?"
        + "pa=" + safePa
        + "&pn=" + safePn
        + "&mc=0000"
        + "&tr=SPAROO_" + timestamp
        + "&tn=SPAROO+Payment"
        + "&am=" + safeAm
        + "&cu=INR";
    }

    function openUpi() {
      const upiUrl = buildUpiUrl();
      // Try to open UPI app using the deep link.
      // In most Custom Tabs flows, the UPI intent will open automatically after a redirect.
      window.location.href = upiUrl;
    }

    // Auto-trigger delay (no button click needed).
    // Default is 800ms, but you can override via query param:
    // ?delayMs=1500  OR  ?delay=1500
    const delayMsRaw = getParam("delayMs") || getParam("delay") || "800";
    const delayMs = Number(delayMsRaw);
    const safeDelay = Number.isFinite(delayMs) && delayMs >= 0 ? delayMs : 800;
    setTimeout(openUpi, safeDelay);
  </script>
</body>
</html>
